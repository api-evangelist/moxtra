aid: moxtra
name: Moxtra
description: >-
  Moxtra (now operating as Moxo) is a contextual collaboration and customer
  engagement platform that lets businesses embed chat, video meetings, voice
  calls, file sharing, e-signature, digital workflows, and binder-based
  collaboration into their own mobile and web applications via SDKs and REST
  APIs. The Moxtra Developer Portal exposes 200+ REST API endpoints for
  managing users, binders (workspaces), messages, files, meetings, todos,
  and notifications. Authentication uses OAuth 2.0 access tokens issued
  against the Moxtra (or self-branded GroupHour) authorization server.
type: Index
