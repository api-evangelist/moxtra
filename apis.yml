apis:
  - aid: moxtra:rest-api
    name: Moxtra REST API
    description: >-
      Moxtra's REST API for building embedded collaboration experiences,
      covering users, binders (workspaces), pages, messages, files, meetings,
      todos, signatures, and webhooks. Authentication uses OAuth 2.0 access
      tokens; partner apps are registered in the Moxtra Developer Portal
      and receive a client ID and secret to obtain user-scoped access tokens.
    humanURL: https://developer.moxtra.com/docs/docs-rest-api/integration/
    baseURL: https://api.moxtra.com/v1
